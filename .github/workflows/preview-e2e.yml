name: Preview E2E

on:
  deployment_status:

jobs:
  playwright:
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment_url != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run preview smoke tests
        run: npx playwright test
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Clean up preview test gifts
        if: always()
        run: |
          node -e "
          const { Client } = require('pg');
          const connectionString = process.env.POSTGRES_URL_NON_POOLING || process.env.POSTGRES_URL || process.env.DATABASE_URL;
          if (!connectionString) {
            throw new Error('Missing preview Postgres connection string for cleanup.');
          }
          const client = new Client({ connectionString });
          (async () => {
            await client.connect();
            const result = await client.query(\"DELETE FROM gifts WHERE gift_id LIKE 'e2e-%'\");
            console.log(\`Deleted \${result.rowCount} preview test gift rows.\`);
            await client.end();
          })().catch(async (error) => {
            console.error(error);
            try {
              await client.end();
            } catch {}
            process.exit(1);
          });
          "
        env:
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
