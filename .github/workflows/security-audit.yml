name: Security Audit

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - chore/**
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
